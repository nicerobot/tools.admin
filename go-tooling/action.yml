name: "Go Tooling"
description: "Run the bundled Go quality toolchain (format, lint, static/complexity analysis, security, vulnerability scan, tests) via its Makefile — no tooling embedded in your repo."
branding:
  icon: "check-circle"
  color: "blue"
inputs:
  target:
    description: "tools.mk target(s) to run (e.g. 'check', 'lint test', 'security')"
    required: false
    default: "check"
  packages:
    description: "Go package pattern passed as GO_PKGS"
    required: false
    default: "./..."
  args:
    description: "Extra make arguments, e.g. 'GOCYCLO_OVER=20 GO_TEST_FLAGS=-count=1'"
    required: false
    default: ""
runs:
  using: "docker"
  # Prebuilt image — pulled, not rebuilt — so the tools never live in the consumer repo.
  image: "docker://ghcr.io/nicerobot/admin-tools/go-tooling:v2"
  entrypoint: "/opt/go-tooling/entrypoint.sh"
  env:
    INPUT_TARGET: ${{ inputs.target }}
    INPUT_PACKAGES: ${{ inputs.packages }}
    INPUT_ARGS: ${{ inputs.args }}
