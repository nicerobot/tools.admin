# Default revive configuration shipped with the go-tooling image.
# Override by committing a revive.toml to your repo and setting
# REVIVE_CONFIG, or rely on golangci-lint's revive integration instead.
ignoreGeneratedHeader = false
severity = "warning"
confidence = 0.8
errorCode = 1
warningCode = 0
enableAllRules = false

[rule.blank-imports]
[rule.context-as-argument]
[rule.context-keys-type]
[rule.dot-imports]
[rule.error-return]
[rule.error-strings]
[rule.error-naming]
[rule.exported]
[rule.if-return]
[rule.increment-decrement]
[rule.var-naming]
[rule.var-declaration]
[rule.package-comments]
[rule.range]
[rule.receiver-naming]
[rule.time-naming]
[rule.unexported-return]
[rule.indent-error-flow]
[rule.errorf]
[rule.empty-block]
[rule.superfluous-else]
[rule.unreachable-code]
[rule.redefines-builtin-id]
[rule.unused-parameter]
[rule.unhandled-error]
  arguments = ["fmt.Printf", "fmt.Println", "fmt.Print"]
