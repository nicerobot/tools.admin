name: "Refresh Infra"
description: "Pull live infrastructure config and open a PR if drift is detected"

inputs:
  cf-api-token:
    description: "Cloudflare read-only API token"
    required: true
  token:
    description: "GitHub token for creating PRs"
    required: false
    default: ${{ github.token }}

outputs:
  drifted:
    description: "Whether drift was detected (true/false)"
    value: ${{ steps.detect.outputs.drifted }}
  summary:
    description: "Human-readable drift summary"
    value: ${{ steps.detect.outputs.summary }}

runs:
  using: "composite"
  steps:
    - name: Install tools
      shell: bash
      run: |
        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::jq is required but not found"
          exit 1
        fi
        if ! command -v yq >/dev/null 2>&1; then
          echo "::group::Installing yq"
          YQ_VERSION=v4.44.6
          curl -sfL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          echo "::endgroup::"
        fi

    - name: Pull Cloudflare zone config
      shell: bash
      env:
        CF_READ_ONLY_API_TOKEN: ${{ inputs.cf-api-token }}
      run: '"${{ github.action_path }}/scripts/pull-zone"'

    - name: Detect drift
      id: detect
      shell: bash
      run: |
        CHANGES="$(git diff --name-only -- cloudflare/)"
        if [[ -n "${CHANGES}" ]]; then
          echo "drifted=true" >> "${GITHUB_OUTPUT}"
          SUMMARY="$(git diff --stat -- cloudflare/)"
          {
            echo 'summary<<DRIFT_EOF'
            echo "${SUMMARY}"
            echo 'DRIFT_EOF'
          } >> "${GITHUB_OUTPUT}"
          echo "::warning::Drift detected in cloudflare config"
        else
          echo "drifted=false" >> "${GITHUB_OUTPUT}"
          echo "summary=No drift detected" >> "${GITHUB_OUTPUT}"
          echo "::notice::No drift detected"
        fi

    - name: Create PR
      if: steps.detect.outputs.drifted == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        # Pass the drift summary through the environment, not interpolated into
        # the script, so bash treats it as data (avoids Actions-expression
        # injection — the summary derives from live zone config).
        DRIFT_SUMMARY: ${{ steps.detect.outputs.summary }}
      run: |
        BRANCH="refresh-infra/$(date -u +%Y%m%dT%H%M%S)"
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git checkout -b "${BRANCH}"
        git add cloudflare/
        git commit -m "refresh: update cloudflare zone config from live state"
        git push origin "${BRANCH}"
        gh pr create \
          --title "Refresh: Cloudflare config drift detected" \
          --body "$(cat <<PR_EOF
        ## Drift detected

        Live Cloudflare zone config differs from what is committed.

        ${DRIFT_SUMMARY}

        Review the changes and merge if they reflect intentional updates.

        ---
        *Generated by [refresh-infra](https://github.com/nicerobot/tools.admin/tree/main/refresh-infra)*
        PR_EOF
        )"
